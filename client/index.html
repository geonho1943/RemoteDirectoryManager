<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@300;400;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/base.css">
    <link rel="stylesheet" href="./assets/css/login.css">
</head>
<body class="page-login">
<div id="loading-bar" class="loading-bar"></div>
<div id="toast-container" class="toast-container"></div>

<main class="login-screen">
    <section class="login-card shell-card">
        <div class="login-card-head">
            <div>
                <div class="eyebrow">Remote Directory Manager</div>
                <h1 class="login-logo">VAULT<span class="accent-dot">.</span></h1>
                <p class="login-subtitle">Secure browser for directory listing, upload, preview, and tag control.</p>
            </div>
        </div>

        <div class="login-copy">
            <p>Only the API key is required here. Server address input is intentionally removed because this client runs on the same origin as the service.</p>
        </div>

        <form id="loginForm" class="login-form" novalidate>
            <label class="field-group">
                <span class="field-label">API Key</span>
                <input
                    id="apiKeyInput"
                    class="text-input"
                    type="password"
                    autocomplete="current-password"
                    placeholder="Enter your API key"
                >
            </label>

            <button id="connectButton" class="btn btn-primary btn-block" type="submit">Connect</button>
            <p id="loginError" class="inline-error hidden" role="alert"></p>
        </form>
    </section>
</main>

<script type="module" src="./assets/js/pages/login.js"></script>
</body>
</html>
